      - name: "Provision database for ${{ vars.APP_NAME }}-${{ inputs.environment }}-function"
        id: provision_function_database
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/provision/database@feature/function-as-compaction
        with:
          environment: ${{ inputs.environment }}
          database-name: ${{ vars.APP_NAME }}-function-${{ inputs.environment }}-db
          sql-server-resource-group: 'HVI-UTVIKLING-${{ inputs.environment }}-FELLES-rg'          
          sql-server-name: 'felles-db-server-${{inputs.environment}}-managedid'

