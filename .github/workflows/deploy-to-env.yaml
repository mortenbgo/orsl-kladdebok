name: "Provision og deploy til miljø"
on:
  workflow_call:
    inputs:
      environment:
        description: "Environment man vil deploye til"
        required: true
        type: string
env:
  APP_NAME: "orsl-kladdebok"
  WEB_ARTIFACT_NAME: "web-${{ inputs.environment }}"
jobs:
  deploy:
    name: "Deploy til ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
      - name: Parse Azure Config
        id: config
        env:
          AZURE_CONFIG: ${{ vars.AZURE_CONFIG }}
        run: |
          # NOTE: The error message "(...) ikke provisjonert (...)" is used by
          # the vending machine (New-App.ps1) to detect failed initial deployments.
          if [ -z "$AZURE_CONFIG" ]; then
            echo "::error::Dette repoet er ikke provisjonert enda. Opprett en PR i vending-machine repoet for denne appen: https://github.com/HelseVestIKT/HVI-UTV-Plattform/tree/main/apps"
            exit 1
          fi

          APP_NAME=$(echo "$AZURE_CONFIG" | jq -r '.appServiceName')
          RESOURCE_GROUP=$(echo "$AZURE_CONFIG" | jq -r '.resourceGroupName')

          echo "app-name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "resource-group=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "api-app-name=$APP_NAME-api" >> $GITHUB_OUTPUT
        
      - name: Azure Login
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/azure-login-v2@main
        with:
          azure-config: ${{ vars.AZURE_CONFIG }}


