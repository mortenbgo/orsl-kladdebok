      - name: "Deploy Function App to ${{ inputs.environment }}"  
        id: deploy_function
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/deploy/dotnet-function-app@feature/function-as-compaction
        with:
          function-app-name: ${{ vars.APP_NAME }}-${{ inputs.environment }}-function
          environment: ${{ inputs.environment }}
          artifact-name: 'function-app'
          resource-group: 'HVI-UTV-${{ inputs.environment }}-orsl-kladdebok-rg'
          cors: 'https://www.bt.no, https://portal.azure.com, https://nrk.no'
          vars-json: ${{ toJSON(vars) }}
          secrets-json: ${{ toJSON(secrets) }}
          connection-string-navn: 'KladdebokFunctionDbConnection'
          connection-string: ${{ steps.provision_function_database.outputs.connection-string }}

      - name: "Add managed identity to database for ${{ vars.APP_NAME }}-${{ inputs.environment }}-function with output from provision database"
        id: add_managed_id_function
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/provision/managed-id@feature/function-as-compaction
        with:
          environment: ${{ inputs.environment }}
          app-name: ${{ vars.APP_NAME }}-${{ inputs.environment }}-function
          sql-server-resource-group: 'HVI-UTVIKLING-${{ inputs.environment }}-FELLES-rg'          
          sql-server-name: 'felles-db-server-${{inputs.environment}}-managedid'
          sql-connection-string: ${{ steps.provision_function_database.outputs.connection-string }}


