      - name: Provision Function App for ${{ inputs.environment }}
        id: provision_function_app
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/provision/function@feature/function-as-compaction
        with:
          environment: ${{ inputs.environment }}
          function-app-name: ${{ vars.APP_NAME }}-${{ inputs.environment }}-function
          resource-group: 'HVI-UTV-${{ inputs.environment }}-orsl-kladdebok-rg'
          dotnet-version: 'v9.0'
          storage-account-name: 'orslkladdebok${{ inputs.environment }}sa'

