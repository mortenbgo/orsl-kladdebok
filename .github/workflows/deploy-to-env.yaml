      #     external-access: ${{ contains(fromJSON('["QA", "PROD"]'), inputs.environment) }}
      #     resource-group: 'HVI-UTV-${{ inputs.environment }}-orsl-kladdebok-rg'
      #     app-service-plan-name: ${{ env.APP_SERVICE_PLAN_NAME }}
      #     app-service-plan-resource-group-name: ${{env.APP_SERVICE_PLAN_RESOURCE_GROUP_NAME}}

      # - name: Provision API app service for ${{ inputs.environment }}
