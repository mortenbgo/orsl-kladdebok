on:
  push:
    branches:
  #     - main
      - disco-comp
  workflow_dispatch:
    
jobs:  
  build-function:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build function app
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/build/dotnet-function-app@main
        with:
          project-directory: './function'
          artifact-name: 'function-app'
          dotnet-version: '8.x'

  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build API app
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/build/dotnet-app@main
        with:
          project-directory: './API'
          artifact-name: 'api'
          dotnet-version: '9.x'

