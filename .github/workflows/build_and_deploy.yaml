on:
  push:
    branches:
      - main
      - disco-comp
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build function app
        uses: HelseVestIKT/HVI-Felles-WorkFlows/.github/actions/build/function-app@feature/function-as-compaction
        with:
          project-directory: './function'
          artifact-name: 'function-app'
